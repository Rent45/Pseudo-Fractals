<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="shortcut icon" type="image/x-icon" href="BILKA.png">
  <title>PseudoFractals</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
    }
    main {
      /* Pushes the canvas exactly past the 320px sidebar */
      margin-left: 320px; 
      /* Ensures the canvas container takes up exactly the rest of the screen */
      width: calc(100vw - 320px); 
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #settings {
      padding: 30px;
      box-sizing: border-box;
      background-color: #f4f4f4;
      border-right: 1px solid #ddd;
      height: 100vh;
      overflow-y: auto; /* Adds a scrollbar if the screen is small */
      width: 320px;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 10;
    }
    .btn-row {
      display: flex;
      gap: 10px;
    }
    #VisualButton {
      width: 100%;
      letter-spacing: 4px;
      font-size: larger;
      margin-bottom: 10px;
      background-color: #2196F3;
    }
    button {
      background-color: #4CAF50;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 10px;
      transition: background-color 0.2s;
    }
    button:hover { background-color: #45a049; }
    #VisualButton:hover { background-color: #0b7dda; }
    
    label {
      cursor: pointer;
      display: block;
      margin-top: 10px;
      margin-bottom: 5px;
      color: #333;
      font-weight: bold;
      transition: color 0.2s;
    }
    label:hover { color: #4CAF50; }
    
    input, select {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 3px;
    }
  </style>
</head>
<body>

  <!-- UI Control Panel -->
  <div id="settings">
    <button id="VisualButton" onclick="visualise()">Visualise</button>
    <div class="btn-row">
      <button id="RandomButton" onclick="randomise()">Randomise</button>
      <button id="HELP" onclick="needhelp()">Help me!</button>
    </div>
    
    <!-- Automatically shows/hides the 'n' variable box based on selection -->
    <select id="functionSelector" onchange="document.getElementById('FuncVar').hidden = !(this.value === 'nPowerZ' || this.value === 'zPowerN')">
      <option value="zSquared">z^2</option>
      <option value="sinZ">sin(z)</option>
      <option value="cosZ">cos(z)</option>
      <option value="ePowerZ">e^z</option>
      <option value="nPowerZ">n^z</option>
      <option value="zPowerN">z^n</option>
      <option value="zPowerZ">z^z</option>
      <option value="zPower1Z">z^(1/z)</option>
      <option value="sinhz">sinhz</option>
      <option value="coshz">coshz</option>
    </select>

    <select id="signSelector" style="margin-top: 10px;">
      <option value="plus">+</option>
      <option value="minus">-</option>
      <option value="multiply">*</option>
      <option value="divide">/</option>
      <option value="power">^</option>
      <option value="multiply_componentwise">* (componentwise)</option>
      <option value="divide_componentwise">/ (componentwise)</option>
      <option value="power_componentwise">^ (componentwise)</option>
    </select>
    
    <input type="number" id="FuncVar" placeholder="Enter n (decimals for fractions)" hidden style="margin-top: 10px;">
    
    <label onclick="randomWidth();" for="widthInput">Picture Width:</label>
    <input type="number" id="widthInput" value="800">
    
    <label onclick="randomHeight();" for="heightInput">Picture Height:</label>
    <input type="number" id="heightInput" value="600">
    
    <label onclick="randomMaxV();" for="MaxVal">Max Escape Radius:</label>
    <input type="number" id="MaxVal" value="10"> <!-- Higher value works better for smooth coloring -->
    
    <label onclick="randomMaxI();" for="MaxIt">Max Iterations:</label>
    <input type="number" id="MaxIt" value="30">
    
    <label onclick="randomZoom();" for="ZoomInput">Zoom:</label>
    <input type="number" id="ZoomInput" value="0.9">
    
    <label onclick="randomX();" for="XInput">X offset:</label>
    <input type="number" id="XInput" value="-0.5">
    
    <label onclick="randomY();" for="YInput">Y Offset:</label>
    <input type="number" id="YInput" value="0">
    
    <!-- Color Inputs. Clicking the label randomizes just that color and redraws. -->
    <label id="Red11" onclick="randomColor(1, 1);" for="Red1">Far from set, red colour:</label>
    <input type="number" id="Red1" value="0" min="0" max="255">
    <label id="Green11" onclick="randomColor(2, 1);" for="Green1">Far from set, green colour:</label>
    <input type="number" id="Green1" value="225" min="0" max="255">
    <label id="Blue11" onclick="randomColor(0, 1);" for="Blue1">Far from set, blue colour:</label>
    <input type="number" id="Blue1" value="255" min="0" max="255">
    
    <label id="Red22" onclick="randomColor(1, 2);" for="Red2">Close to set, red colour:</label>
    <input type="number" id="Red2" value="255" min="0" max="255">
    <label id="Green22" onclick="randomColor(2, 2);" for="Green2">Close to set, green colour:</label>
    <input type="number" id="Green2" value="225" min="0" max="255">
    <label id="Blue22" onclick="randomColor(0, 2);" for="Blue2">Close to set, blue colour:</label>
    <input type="number" id="Blue2" value="0" min="0" max="255">
    
    <label id="Red33" onclick="randomColor(1, 3);" for="Red3">In set, red colour:</label>
    <input type="number" id="Red3" value="0" min="0" max="255">
    <label id="Green33" onclick="randomColor(2, 3);" for="Green3">In set, green colour:</label>
    <input type="number" id="Green3" value="0" min="0" max="255">
    <label id="Blue33" onclick="randomColor(0, 3);" for="Blue3">In set, blue colour:</label>
    <input type="number" id="Blue3" value="75" min="0" max="255">
  </div>

  <main>
    <!-- We replace p5.js completely with a native HTML5 Canvas for massive speed -->
    <canvas id="fractalCanvas"></canvas>
  </main>

  <script>
    /* =========================================
       1. GLOBAL SETUP & UI CONTROLS
       ========================================= */
    const colors = ["Blue", "Red", "Green"];

    // Initialize the canvas on load
    window.onload = () => {
      updateAllColorLabels();
      visualise();
    };

    // Helper: Randomize a specific color, update the CSS text, and instantly redraw
    function randomColor(colorIdx, groupIdx) {
      document.getElementById(colors[colorIdx] + groupIdx).value = Math.floor(Math.random() * 256);
      updateColorLabels(groupIdx);
      visualise();
    }

    function updateColorLabels(j) {
      const r = document.getElementById('Red' + j).value;
      const g = document.getElementById('Green' + j).value;
      const b = document.getElementById('Blue' + j).value;
      for (let d = 0; d < colors.length; d++) {
        document.getElementById(colors[d] + j + j).style.color = `rgb(${r}, ${g}, ${b})`;
      }
    }

    function updateAllColorLabels() {
      updateColorLabels(1); updateColorLabels(2); updateColorLabels(3);
    }

    // Input randomization functions (all trigger an instant redraw)
    function randomWidth() { document.getElementById('widthInput').value = Math.floor(Math.random() * 1000 + 400); visualise(); }
    function randomHeight() { document.getElementById('heightInput').value = Math.floor(Math.random() * 1000 + 400); visualise(); }
    function randomMaxV() { document.getElementById('MaxVal').value = Math.floor(Math.random() * 50 + 10); visualise(); }
    function randomMaxI() { document.getElementById('MaxIt').value = Math.floor(Math.random() * 80 + 10); visualise(); }
    function randomZoom() { document.getElementById('ZoomInput').value = Math.round(Math.random() * 500) / 100 + 0.1; visualise(); }
    function randomX() { document.getElementById('XInput').value = Math.round((Math.random() * 4 - 2) * 100) / 100; visualise(); }
    function randomY() { document.getElementById('YInput').value = Math.round((Math.random() * 4 - 2) * 100) / 100; visualise(); }

    function randomise() {
      const funcs = ["zSquared", "sinZ", "cosZ", "ePowerZ", "nPowerZ", "zPowerN", "zPowerZ", "zPower1Z", "sinhz", "coshz"];
      const signs = ["plus", "minus", "multiply", "divide", "power", "multiply_componentwise", "divide_componentwise", "power_componentwise"];
      
      const fSel = funcs[Math.floor(Math.random() * funcs.length)];
      document.getElementById('functionSelector').value = fSel;
      document.getElementById('signSelector').value = signs[Math.floor(Math.random() * signs.length)];

      document.getElementById('widthInput').value = Math.floor(Math.random() * 1000 + 400);
      document.getElementById('heightInput').value = Math.floor(Math.random() * 1000 + 400);
      document.getElementById('MaxVal').value = Math.floor(Math.random() * 50 + 10);
      document.getElementById('MaxIt').value = Math.floor(Math.random() * 80 + 10);
      document.getElementById('ZoomInput').value = Math.round(Math.random() * 500) / 100 + 0.1;
      document.getElementById('XInput').value = Math.round((Math.random() * 4 - 2) * 100) / 100;
      document.getElementById('YInput').value = Math.round((Math.random() * 4 - 2) * 100) / 100;

      const fv = document.getElementById('FuncVar');
      if (fSel === 'nPowerZ' || fSel === 'zPowerN') {
        fv.value = Math.round((Math.random() * 20 - 10) * 10) / 10;
        fv.hidden = false;
      } else {
        fv.hidden = true;
      }

      for (let i = 0; i < colors.length; i++) {
        for (let j = 1; j <= 3; j++) {
          document.getElementById(colors[i] + j).value = Math.floor(Math.random() * 256);
        }
      }
      updateAllColorLabels();
      visualise();
    }

    // Keyboard navigation
    document.body.addEventListener("keydown", (ev) => {
      // Ignore keypresses if the user is typing in an input box
      if (document.activeElement.tagName === "INPUT") return;

      const zIn = document.getElementById('ZoomInput');
      const zVal = parseFloat(zIn.value);
      const wVal = parseInt(document.getElementById('widthInput').value, 10);
      const hVal = parseInt(document.getElementById('heightInput').value, 10);
      const step = wVal / (2 * hVal * zVal);

      if (ev.key === "ArrowLeft") document.getElementById('XInput').value = parseFloat(document.getElementById('XInput').value) - step;
      else if (ev.key === "ArrowRight") document.getElementById('XInput').value = parseFloat(document.getElementById('XInput').value) + step;
      else if (ev.key === "ArrowUp") document.getElementById('YInput').value = parseFloat(document.getElementById('YInput').value) + 1 / (2 * zVal);
      else if (ev.key === "ArrowDown") document.getElementById('YInput').value = parseFloat(document.getElementById('YInput').value) - 1 / (2 * zVal);
      else if (ev.key === "-") zIn.value = zVal - 0.5 * zVal;
      else if (ev.key === "=" || ev.key === "+") zIn.value = zVal + 0.5 * zVal;
      else return; 
      
      visualise();
    });

    for (let i = 0; i < colors.length; i++) {
      for (let j = 1; j <= 3; j++) {
        document.getElementById(colors[i] + j).addEventListener("input", () => {
          updateColorLabels(j);
        });
      }
    }


    /* =========================================
       2. FRACTAL MATHEMATICS & RENDERING
       ========================================= */

    function visualise() {
      // 1. Gather all inputs outside the loop
      const cW = parseInt(document.getElementById('widthInput').value, 10);
      const cH = parseInt(document.getElementById('heightInput').value, 10);
      const zoom = parseFloat(document.getElementById('ZoomInput').value);
      const offsetX = parseFloat(document.getElementById('XInput').value);
      const offsetY = parseFloat(document.getElementById('YInput').value);
      
      // Using Euclidean distance (a^2 + b^2 <= maxVal^2) removes the need for Math.abs()
      // and guarantees a mathematically circular escape boundary required for smooth shading.
      const maxVal = parseFloat(document.getElementById('MaxVal').value);
      const maxValSq = maxVal * maxVal; 
      const maxIt = parseInt(document.getElementById('MaxIt').value, 10);
      
      const sFunc = document.getElementById('functionSelector').value;
      const sSign = document.getElementById('signSelector').value;
      const nVal = parseFloat(document.getElementById('FuncVar').value) || 0.001; // Avoid exact 0
      const lnNVal = Math.log(Math.abs(nVal));

      // 2. Setup Native Canvas
      const canvas = document.getElementById('fractalCanvas');
      canvas.width = cW;
      canvas.height = cH;
      const ctx = canvas.getContext('2d');
      // Create a direct memory array for pixel manipulation (Fastest rendering method)
      const imgData = ctx.createImageData(cW, cH);
      const pixels = imgData.data;

      // 3. Precalculate Grid Steps (Replaces p5 map() function)
      const stepXY = 2 / (cH * zoom);
      const startA = (-cW / cH) / zoom + offsetX;
      const startB = -1 / zoom - offsetY;

      // 4. Precalculate the Color Palette
      const palette = new Uint8ClampedArray(maxIt * 3); // ClampedArray automatically binds math to 0-255
      const r1 = parseFloat(document.getElementById("Red1").value), g1 = parseFloat(document.getElementById("Green1").value), b1 = parseFloat(document.getElementById("Blue1").value);
      const r2 = parseFloat(document.getElementById("Red2").value), g2 = parseFloat(document.getElementById("Green2").value), b2 = parseFloat(document.getElementById("Blue2").value);
      
      for (let i = 0; i < maxIt; i++) {
        const t = maxIt > 1 ? i / (maxIt - 1) : 0;
        palette[i*3]     = r1 + (r2 - r1) * t;
        palette[i*3+1]   = g1 + (g2 - g1) * t;
        palette[i*3+2]   = b1 + (b2 - b1) * t;
      }
      
      const inSetR = parseFloat(document.getElementById("Red3").value);
      const inSetG = parseFloat(document.getElementById("Green3").value);
      const inSetB = parseFloat(document.getElementById("Blue3").value);

      // Arrays to save axis labels
      const textValx = [], importantx = [];
      const textValy = [], importanty = [];
      const mappedStep = 100 * stepXY;
      let k = -10; while(k <= 10 && mappedStep > 10 ** k) k++;
      const roundMultX = 10 ** (-(k >= 1 ? 0 : k) + 1);
      const roundMultY = 10 ** (-k + 1);

      // 5. THE CORE LOOP - Processes every pixel
      for (let y = 0; y < cH; y++) {
        for (let x = 0; x < cW; x++) {
          
          const ca = startA + x * stepXY;
          const cb = startB + y * stepXY;
          let a = ca, b = cb;
          let n = 0;
          let modSq = a*a + b*b;
          
          // Iterative Escape Time Algorithm using Euclidean bounds
          while (modSq <= maxValSq && n < maxIt) {
            n++;
            let aa = 0, bb = 0;
            
            // Apply complex function (Native Math functions)
            switch (sFunc) {
              case "zSquared":
                aa = a*a - b*b; bb = 2*a*b; break;
              case "sinZ":
                aa = Math.sin(a) * Math.cosh(b); bb = Math.cos(a) * Math.sinh(b); break;
              case "cosZ":
                aa = Math.cos(a) * Math.cosh(b); bb = -Math.sin(a) * Math.sinh(b); break;
              case "ePowerZ":
                const expA = Math.exp(a);
                aa = expA * Math.cos(b); bb = expA * Math.sin(b); break;
              case "sinhz":
                aa = Math.sinh(a) * Math.cos(b); bb = Math.cosh(a) * Math.sin(b); break;
              case "coshz":
                aa = Math.cosh(a) * Math.cosh(b); bb = Math.sinh(a) * Math.sin(b); break;
              case "zPowerZ":
                const thZ = Math.atan2(b, a);
                const lnModZ = 0.5 * Math.log(modSq);
                const expP = Math.exp(a * lnModZ - b * thZ);
                const trgA = a * thZ + b * lnModZ;
                aa = expP * Math.cos(trgA); bb = expP * Math.sin(trgA); break; // Fixed trig inversion here
              case "nPowerZ":
                const pwr = nVal ** a;
                aa = pwr * Math.cos(b * lnNVal); bb = pwr * Math.sin(b * lnNVal); break;
              case "zPowerN":
                const thN = Math.atan2(b, a);
                const modN = modSq ** (nVal / 2);
                aa = modN * Math.cos(nVal * thN); bb = modN * Math.sin(nVal * thN); break;
              case "zPower1Z":
                const th1 = Math.atan2(b, a);
                const lnMod1 = Math.log(modSq);
                const exp1 = Math.exp((a * lnMod1 + 2 * b * th1) / (2 * modSq));
                const trg1 = (2 * a * th1 - b * lnMod1) / (2 * modSq);
                aa = exp1 * Math.cos(trg1); bb = exp1 * Math.sin(trg1); break;
            }
            
            // Combine with initial point C
            switch (sSign) {
              case "plus":     a = aa + ca; b = bb + cb; break;
              case "minus":    a = aa - ca; b = bb - cb; break;
              case "multiply": a = (aa * ca) - (bb * cb); b = (aa * cb) + (bb * ca); break;
              case "divide":   a = (aa * ca + bb * cb) / (ca * ca + cb * cb); b = (bb * ca - aa * cb) / (ca * ca + cb * cb); break;
              case "power":    if (aa * aa + bb * bb === 0) {a = 0; b = 0;} else {
                const L = 0.5 * Math.log(aa * aa + bb * bb);
                const theta = Math.atan2(bb, aa);
                
                const U = ca * L - cb * theta;
                const V = ca * theta + cb * L;
                
                const expU = Math.exp(U);
                a = expU * Math.cos(V);
                b = expU * Math.sin(V);
              }; break;
              case "multiply_componentwise": a = aa * ca; b = bb * cb; break;
              case "divide_componentwise":   a = aa / ca; b = bb / cb; break;
              case "power_componentwise":    a = aa ** ca; b = bb ** cb; break;
            }
            
            modSq = a*a + b*b; // Re-evaluate modulus for next loop
          }
          
          // 6. CONTINUOUS SMOOTH COLORING
          const pIdx = (x + y * cW) * 4;
          
          if (n < maxIt) {
            // Apply logarithmic smoothing to find the exact fractional jump past the boundary
            const lnMod = 0.5 * Math.log(modSq);
            let nu = n + 1 - Math.log(lnMod) / Math.LN2;
            if (isNaN(nu) || nu < 0) nu = 0; // Failsafe for mathematical collapse
            
            // Find the two nearest integer steps to blend between
            const i1 = Math.floor(nu);
            const i2 = Math.min(i1 + 1, maxIt - 1);
            const frac = nu - i1;
            
            // Linear interpolate between the two discrete palette colors
            pixels[pIdx]     = palette[i1*3]   + (palette[i2*3]   - palette[i1*3])   * frac;
            pixels[pIdx + 1] = palette[i1*3+1] + (palette[i2*3+1] - palette[i1*3+1]) * frac;
            pixels[pIdx + 2] = palette[i1*3+2] + (palette[i2*3+2] - palette[i1*3+2]) * frac;
          } else {
            // Point didn't escape (Inside the set)
            pixels[pIdx] = inSetR; pixels[pIdx + 1] = inSetG; pixels[pIdx + 2] = inSetB;
          }
          pixels[pIdx + 3] = 255; // Alpha channel (Opaque)
          
          // Draw Origin Axes inside the pixel loop
          if (x === Math.floor(cW / 2) || y === Math.floor(cH / 2)) {
            pixels[pIdx] = 0; pixels[pIdx+1] = 0; pixels[pIdx+2] = 0;
          }
          
          // Capture tick marks for the axes
          if (y > cH / 2 - 5 && y < cH / 2 + 5 && x > 0 && x < cW - 20 && x % 100 === 0) {
            textValx.push((Math.round(roundMultX * ca) / roundMultX).toString());
            importantx.push(x);
          }
          if (x > cW / 2 - 5 && x < cW / 2 + 5 && y !== 0 && y < cH - 20 && y % 100 === 0) {
            textValy.push((Math.round(roundMultY * (-cb)) / roundMultY).toString());
            importanty.push(y);
          }
        }
      }
      
      // Flush pixel array to the visual canvas
      ctx.putImageData(imgData, 0, 0);
      
      // 7. DRAW NATIVE AXIS LABELS
      ctx.lineWidth = 2;
      ctx.strokeStyle = "black";
      ctx.fillStyle = "white";
      ctx.font = "14px Arial";
      
      // X-Axis tick marks
      for (let i = importantx.length - 1; i >= 0; i--) {
        ctx.beginPath();
        ctx.moveTo(importantx[i], cH / 2 - 5);
        ctx.lineTo(importantx[i], cH / 2 + 5);
        ctx.stroke();
        ctx.fillText(textValx[i], importantx[i] + 5, cH / 2 + 20);
      }
      
      // Y-Axis tick marks
      for (let i = importanty.length - 1; i >= 0; i--) {
        ctx.beginPath();
        ctx.moveTo(cW / 2 - 5, importanty[i]);
        ctx.lineTo(cW / 2 + 5, importanty[i]);
        ctx.stroke();
        ctx.fillText(textValy[i] + 'i', cW / 2 + 10, importanty[i] + 4);
      }
    }

    function needhelp() {
      alert("Instructions:\n\n1. Select a complex function and operation. We repeatedly apply it to a complex number (a + bi).\n2. If the number escapes the 'Max Radius', it is colored based on how fast it escaped (Continuous Coloring applied).\n3. If it never escapes, it is 'In Set'.\n\nControls:\n- Click ANY text label (like colors or width) to instantly randomize it.\n- Use Arrow Keys to pan the camera.\n- Use +/- to zoom in and out.");
    }
  </script>
</body>
</html>
